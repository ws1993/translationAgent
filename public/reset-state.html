<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置翻译状态</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f6f1e8;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1f2421;
            margin-top: 0;
        }
        button {
            background: #c8853f;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            background: #a86b2c;
        }
        button.secondary {
            background: #e2d9c8;
            color: #1f2421;
        }
        button.secondary:hover {
            background: #d0c7b6;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        .code {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
            overflow-x: auto;
        }
        ul {
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔧 重置翻译状态</h1>
        <p>如果翻译功能卡住无法使用，点击下面的按钮可以立即清除所有缓存状态。</p>
        
        <div style="margin: 20px 0;">
            <button onclick="resetAll()">清除所有数据并重置</button>
            <button onclick="resetStateOnly()" class="secondary">仅重置运行状态</button>
            <button onclick="viewStorage()" class="secondary">查看当前状态</button>
        </div>

        <div id="status" class="status"></div>

        <h3>说明</h3>
        <ul>
            <li><strong>清除所有数据并重置</strong>：删除所有翻译历史和状态，完全重置（推荐）</li>
            <li><strong>仅重置运行状态</strong>：保留翻译历史，只清除"翻译中"状态</li>
            <li><strong>查看当前状态</strong>：在控制台查看当前存储的数据</li>
        </ul>

        <h3>手动操作</h3>
        <p>你也可以打开浏览器控制台（F12），执行以下命令：</p>
        <div class="code">
// 清除所有数据<br>
localStorage.removeItem('translation-storage');<br>
localStorage.removeItem('llm-config-storage');<br>
location.reload();
        </div>
    </div>

    <script>
        function showStatus(message, type = 'success') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }

        function resetAll() {
            try {
                localStorage.removeItem('translation-storage');
                showStatus('✓ 已清除所有翻译数据，页面将在 2 秒后刷新...', 'success');
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } catch (error) {
                showStatus('✗ 重置失败: ' + error.message, 'error');
            }
        }

        function resetStateOnly() {
            try {
                const storageKey = 'translation-storage';
                const data = JSON.parse(localStorage.getItem(storageKey) || '{}');
                
                if (data.state) {
                    // 保留 tasks，重置其他状态
                    data.state = {
                        tasks: data.state.tasks || [],
                        currentTask: null,
                        isTranslating: false,
                        progress: { stage: 'idle', progress: 0 }
                    };
                    localStorage.setItem(storageKey, JSON.stringify(data));
                    showStatus('✓ 已重置运行状态（保留翻译历史），页面将在 2 秒后刷新...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showStatus('ℹ 未找到需要重置的状态', 'info');
                }
            } catch (error) {
                showStatus('✗ 重置失败: ' + error.message, 'error');
            }
        }

        function viewStorage() {
            const data = {
                'translation-storage': JSON.parse(localStorage.getItem('translation-storage') || 'null'),
                'llm-config-storage': JSON.parse(localStorage.getItem('llm-config-storage') || 'null'),
                'domain-storage': JSON.parse(localStorage.getItem('domain-storage') || 'null')
            };
            console.log('=== 当前存储状态 ===');
            console.log(data);
            showStatus('✓ 状态已打印到控制台（按 F12 查看）', 'info');
        }

        // 页面加载时检查状态
        window.addEventListener('load', () => {
            try {
                const data = JSON.parse(localStorage.getItem('translation-storage') || '{}');
                if (data.state && data.state.isTranslating) {
                    showStatus('⚠️ 检测到翻译状态卡住（isTranslating=true），建议点击"清除所有数据并重置"', 'info');
                }
            } catch (e) {
                // 忽略解析错误
            }
        });
    </script>
</body>
</html>
